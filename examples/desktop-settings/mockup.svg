<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="720" viewBox="0 0 1024 720" role="img" aria-labelledby="title">
  <title id="title">Synthetic desktop settings panel</title>
  <rect width="1024" height="720" fill="#eef1f4"/>
  <rect x="32" y="32" width="960" height="656" rx="8" fill="#ffffff" stroke="#d3dbe2"/>
  <rect x="32" y="32" width="230" height="656" rx="8" fill="#e7edf2"/>
  <g font-family="system-ui,sans-serif" fill="#18212a">
    <text x="72" y="86" font-size="15" font-weight="700">SETTINGS</text>
    <text x="72" y="142" font-size="17" font-weight="700" fill="#315c88">General</text>
    <text x="72" y="188" font-size="17">Appearance</text>
    <text x="72" y="234" font-size="17">Notifications</text>
    <text x="72" y="280" font-size="17">Privacy</text>
    <text x="310" y="100" font-size="30" font-weight="700">General preferences</text>
    <text x="310" y="136" font-size="15" fill="#5b6873">Synthetic example — no account or device data is collected.</text>
    <text x="310" y="204" font-size="15" font-weight="700">Workspace name</text>
    <rect x="310" y="224" width="620" height="48" rx="5" fill="#ffffff" stroke="#aebbc6"/>
    <text x="328" y="255" font-size="16">Example workspace</text>
    <rect x="310" y="322" width="20" height="20" rx="3" fill="#315c88"/>
    <path d="M315 332l4 4 7-9" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="346" y="338" font-size="16">Use compact navigation</text>
    <rect x="310" y="370" width="20" height="20" rx="3" fill="#fff" stroke="#aebbc6"/>
    <text x="346" y="386" font-size="16">Play completion sounds</text>
    <line x1="310" y1="558" x2="930" y2="558" stroke="#d3dbe2"/>
    <text x="310" y="612" font-size="15" fill="#5b6873">No unsaved changes</text>
    <rect x="790" y="580" width="140" height="44" rx="5" fill="#315c88"/>
    <text x="815" y="608" font-size="15" font-weight="700" fill="#ffffff">Save changes</text>
  </g>
</svg>
